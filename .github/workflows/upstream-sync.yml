name: Upstream Sync

# Fetches latest from openclaw/openclaw, merges it, reapplies patches,
# builds and tests. On success: creates a PR. On failure: opens an issue.

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    name: Sync upstream → apply patches → build → PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/openclaw/openclaw.git
          git fetch upstream main

      - name: Check if already up to date
        id: check-sync
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          FORK_SHA=$(git rev-parse HEAD)
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          echo "fork_sha=$FORK_SHA" >> "$GITHUB_OUTPUT"
          if [ "$UPSTREAM_SHA" = "$FORK_SHA" ]; then
            echo "already_up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "Fork is already up to date with upstream. Nothing to do."
          else
            echo "already_up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "Upstream has new commits. Fork is behind."
            echo "  Upstream: $UPSTREAM_SHA"
            echo "  Fork:     $FORK_SHA"
          fi

      - name: Create sync branch
        if: steps.check-sync.outputs.already_up_to_date != 'true'
        run: |
          BRANCH="upstream-sync-$(date +%Y%m%d)"
          # Delete existing branch from a previous attempt (best-effort)
          git push origin ":$BRANCH" 2>/dev/null || true
          git branch -D "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          echo "SYNC_BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Merge upstream/main
        if: steps.check-sync.outputs.already_up_to_date != 'true'
        id: merge
        run: |
          if git merge --no-edit upstream/main; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "Merge succeeded."
          else
            echo "result=conflict" >> "$GITHUB_OUTPUT"
            CONFLICT_FILES=$(git diff --name-only --diff-filter=U | tr '\n' ' ')
            echo "conflict_files=$CONFLICT_FILES" >> "$GITHUB_OUTPUT"
            echo "Merge conflicts detected in: $CONFLICT_FILES"
            git merge --abort
          fi

      - name: Open issue for merge conflict
        if: >
          steps.check-sync.outputs.already_up_to_date != 'true' &&
          steps.merge.outputs.result == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const upstreamSha = '${{ steps.check-sync.outputs.upstream_sha }}';
            const conflictFiles = '${{ steps.merge.outputs.conflict_files }}';

            const body = [
              '## Upstream Sync Failed — Merge Conflict',
              '',
              `The weekly upstream sync could not automatically merge \`openclaw/openclaw:main\` into this fork.`,
              '',
              `**Date:** ${date}`,
              `**Upstream SHA:** \`${upstreamSha}\``,
              `**Conflicting files:** ${conflictFiles || '(see workflow logs)'}`,
              '',
              '### Manual resolution',
              '',
              '```bash',
              'cd ~/openclaw-dev',
              'git fetch upstream',
              `git checkout -b upstream-sync-${date}`,
              'git merge upstream/main',
              '# Resolve conflicts, then:',
              'git add .',
              'git commit --no-edit',
              'scripts/apply-patches.sh',
              'pnpm build && pnpm test',
              `git push origin upstream-sync-${date}`,
              '# Then open a PR manually',
              '```',
              '',
              'See `patches/PATCH-LOG.md` for context on each patch.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Upstream sync: merge conflict with upstream/main (${date})`,
              body,
            });

      - name: Fail after merge conflict issue created
        if: >
          steps.check-sync.outputs.already_up_to_date != 'true' &&
          steps.merge.outputs.result == 'conflict'
        run: |
          echo "::error::Merge conflict with upstream/main — issue opened. Resolve manually."
          exit 1

      # ── Setup environment (only when merge succeeded) ──────────────────────

      - name: Setup Node.js
        if: >
          steps.check-sync.outputs.already_up_to_date != 'true' &&
          steps.merge.outputs.result == 'success'
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          check-latest: false

      - name: Setup pnpm
        if: >
          steps.check-sync.outputs.already_up_to_date != 'true' &&
          steps.merge.outputs.result == 'success'
        run: |
          corepack enable
          for attempt in 1 2 3; do
            if corepack prepare pnpm@10.23.0 --activate; then
              pnpm -v
              break
            fi
            echo "corepack prepare failed (attempt $attempt/3). Retrying..."
            sleep $((attempt * 10))
          done

      - name: Resolve pnpm store path
        if: >
          steps.check-sync.outputs.already_up_to_date != 'true' &&
          steps.merge.outputs.result == 'success'
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        if: >
          steps.check-sync.outputs.already_up_to_date != 'true' &&
          steps.merge.outputs.result == 'success'
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-sync-node22-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-sync-node22-
            ${{ runner.os }}-pnpm-store-node22-

      - name: Install dependencies
        if: >
          steps.check-sync.outputs.already_up_to_date != 'true' &&
          steps.merge.outputs.result == 'success'
        run: pnpm install --frozen-lockfile

      # ── Apply patches ───────────────────────────────────────────────────────

      - name: Apply patches
        if: >
          steps.check-sync.outputs.already_up_to_date != 'true' &&
          steps.merge.outputs.result == 'success'
        id: apply-patches
        run: |
          chmod +x scripts/apply-patches.sh
          set +e
          scripts/apply-patches.sh 2>&1 | tee /tmp/patch-output.txt
          PATCH_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "$PATCH_EXIT" -eq 0 ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failed" >> "$GITHUB_OUTPUT"
          fi

          # Capture output for the issue body (escape for GitHub output)
          {
            echo "log<<PATCH_LOG_EOF"
            cat /tmp/patch-output.txt
            echo "PATCH_LOG_EOF"
          } >> "$GITHUB_OUTPUT"

          exit "$PATCH_EXIT"

      - name: Open issue for patch conflict
        if: >
          steps.check-sync.outputs.already_up_to_date != 'true' &&
          steps.merge.outputs.result == 'success' &&
          failure() && steps.apply-patches.conclusion == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const upstreamSha = '${{ steps.check-sync.outputs.upstream_sha }}';
            const syncBranch = process.env.SYNC_BRANCH || `upstream-sync-${date}`;
            const patchLog = `${{ steps.apply-patches.outputs.log }}`;

            const body = [
              '## Upstream Sync Failed — Patch Conflict',
              '',
              'After merging `openclaw/openclaw:main`, one or more patches from `patches/` failed to apply cleanly.',
              '',
              `**Date:** ${date}`,
              `**Upstream SHA:** \`${upstreamSha}\``,
              `**Sync branch:** \`${syncBranch}\``,
              '',
              '### Active patches (one or more need updating)',
              '',
              '- `patches/001-imessage-routing-fix.patch` — iMessage routing leak guard',
              '- `patches/003-compaction-warnings.patch` — compaction warning visibility',
              '- `patches/004-bootstrap-budget-warnings.patch` — bootstrap zero-injection warnings',
              '',
              '### Patch application output',
              '',
              '```',
              patchLog,
              '```',
              '',
              '### Manual resolution',
              '',
              '```bash',
              'cd ~/openclaw-dev',
              'git fetch upstream',
              `git checkout -b ${syncBranch}`,
              'git merge upstream/main',
              '',
              '# Reapply the changes manually for each failing patch.',
              '# After fixing the source files, regenerate the patch:',
              '#   git diff HEAD~1 -- path/to/changed/file > patches/NNN-patch-name.patch',
              '',
              'scripts/apply-patches.sh',
              'pnpm build && pnpm test',
              `git push origin ${syncBranch}`,
              '# Then open a PR',
              '```',
              '',
              'See `patches/PATCH-LOG.md` for full context on each patch (what it fixes, which files it touches).',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Upstream sync: patch conflict after upstream/main merge (${date})`,
              body,
            });

      # ── Build and test ──────────────────────────────────────────────────────

      - name: Build
        if: >
          steps.check-sync.outputs.already_up_to_date != 'true' &&
          steps.merge.outputs.result == 'success' &&
          steps.apply-patches.outputs.result == 'success'
        run: pnpm build

      - name: Bundle A2UI canvas (required for tests)
        if: >
          steps.check-sync.outputs.already_up_to_date != 'true' &&
          steps.merge.outputs.result == 'success' &&
          steps.apply-patches.outputs.result == 'success'
        run: pnpm canvas:a2ui:bundle

      - name: Run tests
        if: >
          steps.check-sync.outputs.already_up_to_date != 'true' &&
          steps.merge.outputs.result == 'success' &&
          steps.apply-patches.outputs.result == 'success'
        env:
          OPENCLAW_TEST_WORKERS: 2
          NODE_OPTIONS: --max-old-space-size=4096
        run: pnpm test

      # ── Push branch and create PR ───────────────────────────────────────────

      - name: Push sync branch
        if: >
          steps.check-sync.outputs.already_up_to_date != 'true' &&
          steps.merge.outputs.result == 'success' &&
          steps.apply-patches.outputs.result == 'success'
        run: git push origin "$SYNC_BRANCH"

      - name: Create pull request
        if: >
          steps.check-sync.outputs.already_up_to_date != 'true' &&
          steps.merge.outputs.result == 'success' &&
          steps.apply-patches.outputs.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const upstreamSha = '${{ steps.check-sync.outputs.upstream_sha }}';
            const syncBranch = process.env.SYNC_BRANCH;

            const body = [
              '## Upstream sync',
              '',
              `Automated weekly sync with \`openclaw/openclaw:main\`.`,
              '',
              `**Upstream SHA:** \`${upstreamSha}\``,
              `**Date:** ${date}`,
              '',
              '### What this PR does',
              '',
              '1. Merges the latest commits from `openclaw/openclaw:main`',
              '2. Reapplies all patches from `patches/` (all applied cleanly)',
              '3. Passes `pnpm build` and `pnpm test`',
              '',
              '### Patches reapplied',
              '',
              '- `patches/001-imessage-routing-fix.patch`',
              '- `patches/003-compaction-warnings.patch`',
              '- `patches/004-bootstrap-budget-warnings.patch`',
              '',
              '### Review checklist',
              '',
              '- [ ] Upstream changes do not break any fork-specific behavior',
              '- [ ] No patch was silently dropped or altered by the merge',
              '- [ ] `openclaw doctor --fix` runs clean after installing',
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore: sync upstream openclaw/openclaw (${date})`,
              head: syncBranch,
              base: 'main',
              body,
            });

            console.log(`PR created: ${pr.html_url}`);
            core.summary.addRaw(`**PR created:** ${pr.html_url}`);
            await core.summary.write();
